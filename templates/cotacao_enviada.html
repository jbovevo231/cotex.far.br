<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cotação Enviada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{

            background:#f4f7fb;

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

            font-family:Arial,Helvetica,sans-serif;

        }

        .card-sucesso{

            background:#fff;

            width:480px;

            border-radius:20px;

            padding:45px;

            text-align:center;

            box-shadow:0 10px 30px rgba(0,0,0,.15);

        }

        .icone{

            font-size:70px;

            color:#16a34a;

            margin-bottom:20px;

        }

        h2{

            font-weight:bold;

            color:#198754;

            margin-bottom:15px;

        }

        p{

            color:#666;

            margin-bottom:30px;

        }

    </style>

</head>

<body>

<div class="card-sucesso">

    <div class="icone">
        ✅
    </div>

    <h2>Cotação enviada com sucesso!</h2>

    <p>

        Obrigado por responder.

        Suas informações foram recebidas e já estão disponíveis para análise.

    </p>

    <button
        class="btn btn-success btn-lg"
        onclick="window.close()">

        Fechar

    </button>

</div>

</body>

</html>
