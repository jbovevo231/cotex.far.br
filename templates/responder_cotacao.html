<!DOCTYPE html>
<html lang="pt-BR" translate="no">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responder Cotação</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/responder_cotacao.css">

</head>

<body>

    <div class="background-top"></div>

    <div class="page">

        <header class="header">

            <div class="header-card">

                <div class="header-photo">

                    <img src="/static/img/cotacao.png" alt="Cotação">

                </div>

                <div class="header-info">

                    <span class="tag">
                        COTAÇÃO
                    </span>

                    <h1>{{ nome_cotacao }}</h1>

                    <p>
                        Informe a disponibilidade dos medicamentos.
                    </p>

                </div>

            </div>

        </header>

        <main class="content">

            <form method="POST">

                <!-- ========================= -->
                <!-- DADOS DO REPRESENTANTE -->
                <!-- ========================= -->

                <section class="card-box">

                    <h2 class="card-title">

    <span class="icon-title">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <path d="M20 21a8 8 0 0 0-16 0"/>

            <circle cx="12" cy="7" r="4"/>

        </svg>

    </span>

    Dados do Representante

</h2>
                    <div class="row">

                        <div class="col-lg-4 mb-3">

                            <label>Representante</label>

                            <input
                                type="text"
                                name="representante"
                                class="form-control"
                                placeholder="Nome">

                        </div>

                        <div class="col-lg-4 mb-3">

                            <label>Distribuidora</label>

                            <input
                                type="text"
                                name="distribuidora"
                                class="form-control"
                                placeholder="Distribuidora">

                        </div>

                        <div class="col-lg-4 mb-3">

                            <label>WhatsApp</label>

                            <input
                                type="text"
                                name="whatsapp"
                                class="form-control"
                                placeholder="(00) 00000-0000">

                        </div>

                    </div>

                </section>

                <!-- ========================= -->
                <!-- MEDICAMENTOS -->
                <!-- ========================= -->

                <section class="card-box">

                    <h2 class="card-title">

    <span class="icon-title">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <path d="M10 14L14 10"/>

            <path d="M7 17a4 4 0 0 1 0-6l4-4a4 4 0 1 1 6 6l-4 4a4 4 0 0 1-6 0z"/>

        </svg>

    </span>

    Medicamentos

</h2>

                    {% for item in itens %}

                    <div class="medicine-card status-disponivel" id="card{{ loop.index }}">

                        <div class="medicine-header">

                            <div class="medicine-left">

                                <h3>

    <span class="icon-medicine">

        <input
    type="hidden"
    name="medicamento[]"
    value="{{ item[0] }}">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <path d="M10 14L14 10"/>

            <path d="M7 17a4 4 0 0 1 0-6l4-4a4 4 0 1 1 6 6l-4 4a4 4 0 0 1-6 0z"/>

        </svg>

    </span>

    {{ item[0] }}

</h3>

                                <div class="medicine-info">

                                    <span>{{ item[1] }}</span>

                                    <span>{{ item[2] }} unidades</span>

                                </div>

                            </div>

                            <div class="medicine-status">

                                <label class="status-button success">

                                    <input
                                        type="radio"
                                        name="status{{ loop.index }}"
                                        value="TENHO"
                                        checked
                                        onclick="statusTenho({{ loop.index }})">

                                    <span>Tenho</span>

                                </label>

                                <label class="status-button warning">

                                    <input
                                        type="radio"
                                        name="status{{ loop.index }}"
                                        value="OFERTA"
                                        onclick="statusOferta({{ loop.index }})">

                                    <span>Tenho Oferta</span>

                                </label>

                                <label class="status-button danger">

                                    <input
                                type="radio"
                                name="status{{ loop.index }}"
                                value="NAO_TENHO"
                                onclick="statusNaoTenho({{ loop.index }})">

                                    <span>Não Tenho</span>

                                </label>

                            </div>

                        </div>

                        <div class="medicine-body">

                            <div class="normal-price" id="normal{{ loop.index }}">

                                <label>Valor Unitário</label>

                                <input

    type="text"
    name="preco[]"
    class="form-control preco"
    placeholder="R$ 0,00"
    inputmode="decimal">

                            </div>
                                                        <div class="offer-price d-none" id="offer{{ loop.index }}">

                                <div class="row">

                                    <div class="col-md-6">

                                        <label>Preço Oferta</label>

                                        <input
    type="text"
    name="preco_oferta[]"
    class="form-control preco"
    placeholder="R$ 0,00"
    inputmode="decimal">

                                    </div>

                                    <div class="col-md-6">

                                        <label>A partir de</label>

                                        <input
                                    type="number"
                                    name="quantidade_oferta[]"
                                    class="form-control"
                                    placeholder="Quantidade">

                                    </div>

                                </div>

                                <div class="offer-message">

                                    🔥 Será enviado apenas o valor promocional.

                                </div>

                            </div>

                        </div>

                    </div>

                    {% endfor %}

                </section>

                <div class="footer-actions">

                    <script>
document.querySelector("form").addEventListener("submit", function () {

    console.log("Preço:", document.querySelectorAll('input[name="preco[]"]'));
    console.log("Oferta:", document.querySelectorAll('input[name="preco_oferta[]"]'));

    document.querySelectorAll('input[name="preco[]"]').forEach((i,n)=>{
        console.log("preco", n, i.value, i.disabled);
    });

    document.querySelectorAll('input[name="preco_oferta[]"]').forEach((i,n)=>{
        console.log("oferta", n, i.value, i.disabled);
    });

    document.querySelectorAll('input[name="quantidade_oferta[]"]').forEach((i,n)=>{
        console.log("quantidade", n, i.value, i.disabled);
    });

});
</script>

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg">

                        Enviar Cotação

                    </button>

                </div>

            </form>

        </main>

    </div>

    <script>

    function statusTenho(id){

        const card=document.getElementById("card"+id);

        card.className="medicine-card status-disponivel";

        document.getElementById("normal"+id).classList.remove("d-none");

        document.getElementById("offer"+id).classList.add("d-none");

        document
            .querySelectorAll("#offer"+id+" input")
            .forEach(i=>{

                i.disabled=true;

                i.value="";

            });

        document
            .querySelectorAll("#normal"+id+" input")
            .forEach(i=>{

                i.disabled=false;

            });

    }

    function statusOferta(id){

        const card=document.getElementById("card"+id);

        card.className="medicine-card status-oferta";

        document.getElementById("normal"+id).classList.add("d-none");

        document.getElementById("offer"+id).classList.remove("d-none");

        document
            .querySelectorAll("#normal"+id+" input")
            .forEach(i=>{

                i.disabled=true;

                i.value="";

            });

        document
            .querySelectorAll("#offer"+id+" input")
            .forEach(i=>{

                i.disabled=false;

            });

    }

        function statusNaoTenho(id){

        const card = document.getElementById("card" + id);

        card.className = "medicine-card status-indisponivel";

        document.getElementById("normal" + id).classList.add("d-none");

        document.getElementById("offer" + id).classList.add("d-none");

        document
            .querySelectorAll("#card" + id + " input[type=number]")
            .forEach(i => {

                i.disabled = true;

                i.value = "";

            });

    }

    document.addEventListener("DOMContentLoaded", () => {

        document
            .querySelectorAll(".offer-price input")
            .forEach(i => i.disabled = true);

    });

    document.querySelectorAll(".preco").forEach(input => {

    input.addEventListener("input", function () {

        this.value = this.value.replace(/[^0-9.,]/g, "");

        const partes = this.value.split(/[.,]/);

        if (partes.length > 2) {
            this.value = partes[0] + "." + partes.slice(1).join("");
        }

    });

});

    </script>
